<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUUD LIFE | Premium Millet Nutrition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-dark: #0c3314; --s-fresh: #84e691; --a-gold: #ffde5d; --white: #ffffff;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #faf9f6; color: var(--p-dark); }
        .bg-primary { background-color: var(--p-dark); }
        .text-accent { color: var(--a-gold); }
        .border-accent { border-color: var(--a-gold); }
        
        /* Premium Card Effects */
        .product-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-12px); shadow: 0 30px 60px -12px rgba(12, 51, 20, 0.15); }
        
        /* Custom Cart Drawer Transition */
        .cart-drawer { transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1); transform: translateX(100%); }
        .cart-drawer.open { transform: translateX(0); }
        
        /* Lightbox & Modal */
        .modal-overlay { backdrop-filter: blur(8px); transition: opacity 0.3s ease; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- NAV BAR -->
    <nav class="sticky top-0 z-[100] bg-primary text-white py-4 px-6 border-b border-white/10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="#" class="flex items-center gap-3">
                <img src="https://github.com/guudlife26-commits/guudlife/blob/main/guudlife_logo.webp?raw=true" alt="Logo" class="h-10 w-auto">
                <span class="font-extrabold text-xl tracking-tighter hidden sm:block">GUUD LIFE</span>
            </a>
            
            <div class="flex items-center gap-6">
                <button onclick="toggleLang()" class="text-xs font-bold border-2 border-accent text-accent px-4 py-1.5 rounded-full hover:bg-accent hover:text-black transition-all">தமிழ் / EN</button>
                <div class="relative cursor-pointer" onclick="toggleCart()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-accent text-primary text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full">0</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <section class="bg-primary text-white py-24 px-6 relative overflow-hidden">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center gap-12 relative z-10">
            <div class="flex-1 space-y-6">
                <span class="text-accent font-bold tracking-[0.3em] uppercase text-sm">Experience Health Wealth</span>
                <h2 class="text-6xl md:text-8xl font-extrabold leading-[0.9]">Millet <br><span class="text-secondary italic font-light">Fine Dining.</span></h2>
                <p class="text-white/60 text-lg max-w-md">Elevating ancient grains into modern luxury. Zero preservatives. Infinite vitality.</p>
                <button class="bg-accent text-primary px-10 py-5 rounded-full font-black hover:scale-105 transition-transform">Explore Collection</button>
            </div>
            <div class="flex-1">
                <img src="https://github.com/guudlife26-commits/guudlife/blob/main/product_img.webp?raw=true" class="rounded-[40px] shadow-2xl rotate-3 hover:rotate-0 transition-transform duration-700">
            </div>
        </div>
    </section>

    <!-- PRODUCT CATALOG -->
    <section id="catalog" class="max-w-7xl mx-auto px-6 py-24">
        <div class="flex flex-col md:flex-row justify-between items-end gap-8 mb-16">
            <div>
                <h3 class="text-4xl font-black uppercase tracking-tighter">Artisanal Menu</h3>
                <div class="h-1 w-24 bg-accent mt-2"></div>
            </div>
            <div class="flex bg-white shadow-xl rounded-full p-1 border border-primary/5">
                <button onclick="filterProducts('All')" class="px-8 py-3 rounded-full font-bold text-sm tab-active">All</button>
                <button onclick="filterProducts('Vermicelli')" class="px-8 py-3 rounded-full font-bold text-sm text-gray-400">Vermicelli</button>
                <button onclick="filterProducts('Noodles')" class="px-8 py-3 rounded-full font-bold text-sm text-gray-400">Noodles</button>
            </div>
        </div>
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10"></div>
    </section>

    <!-- PRODUCT DETAIL MODAL -->
    <div id="productModal" class="fixed inset-0 z-[150] hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 modal-overlay bg-primary/95" onclick="closeModal()"></div>
        <div class="absolute inset-y-0 right-0 w-full max-w-4xl bg-white shadow-2xl flex flex-col md:flex-row animate-slide-left">
            <button onclick="closeModal()" class="absolute top-6 left-6 z-50 bg-primary text-white p-2 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
            
            <!-- Gallery Section -->
            <div class="w-full md:w-1/2 bg-gray-100 p-12 flex flex-col justify-center gap-6 overflow-y-auto">
                <div class="gallery-main relative cursor-zoom-in" onclick="openLightbox()">
                    <img id="modalImg" src="" class="w-full h-auto rounded-3xl shadow-xl">
                </div>
                <div class="flex gap-4 overflow-x-auto pb-4">
                    <img src="https://github.com/guudlife26-commits/guudlife/blob/main/product_img.webp?raw=true" class="w-24 h-24 rounded-xl border-2 border-primary cursor-pointer">
                    <div class="w-24 h-24 rounded-xl bg-primary/10 flex items-center justify-center font-bold text-primary">View Full</div>
                </div>
            </div>

            <!-- Content Section -->
            <div class="w-full md:w-1/2 p-12 overflow-y-auto custom-scrollbar">
                <div class="space-y-6">
                    <div>
                        <span id="modalCat" class="text-secondary font-black tracking-widest text-xs uppercase"></span>
                        <h2 id="modalTitle" class="text-4xl font-black mt-2 leading-tight"></h2>
                        <h3 id="modalTitleTa" class="text-xl font-bold text-gray-400"></h3>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <span id="modalPrice" class="text-3xl font-black"></span>
                        <span id="modalSize" class="bg-gray-100 px-4 py-1 rounded-full text-xs font-bold"></span>
                    </div>

                    <div id="modalDesc" class="text-gray-600 leading-relaxed space-y-4"></div>

                    <div class="grid grid-cols-2 gap-4 py-6 border-y border-gray-100">
                        <div>
                            <span class="text-[10px] uppercase font-black text-gray-400">Health Benefit</span>
                            <p id="modalBenefit" class="font-bold text-sm text-primary"></p>
                        </div>
                        <div>
                            <span class="text-[10px] uppercase font-black text-gray-400">Best For</span>
                            <p id="modalStyle" class="font-bold text-sm text-primary"></p>
                        </div>
                    </div>

                    <div class="flex items-center gap-6 pt-6">
                        <div class="flex items-center bg-gray-100 rounded-full px-4 py-2">
                            <button onclick="updateModalQty(-1)" class="w-8 h-8 font-bold text-lg">-</button>
                            <span id="modalQty" class="w-10 text-center font-black">1</span>
                            <button onclick="updateModalQty(1)" class="w-8 h-8 font-bold text-lg">+</button>
                        </div>
                        <button id="modalAddBtn" class="flex-grow bg-primary text-white py-4 rounded-full font-black shadow-xl hover:bg-secondary transition-colors">Add to Basket</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CART SYSTEM -->
    <div id="cartDrawer" class="cart-drawer fixed top-0 right-0 w-full max-w-md h-full bg-white z-[200] shadow-2xl flex flex-col">
        <div class="p-8 bg-primary text-white flex justify-between items-center">
            <h3 class="text-xl font-black uppercase tracking-tighter">Your Basket</h3>
            <button onclick="toggleCart()" class="text-accent hover:scale-125 transition-transform font-bold">CLOSE</button>
        </div>
        
        <div id="cartItems" class="flex-grow overflow-y-auto p-8 space-y-6">
            <!-- Items injected here -->
        </div>

        <div id="checkoutForm" class="hidden p-8 border-t bg-gray-50 space-y-4">
            <h4 class="font-black text-lg">Delivery Details</h4>
            <input type="text" id="custName" placeholder="Full Name" class="w-full p-4 rounded-xl border">
            <input type="tel" id="custPhone" placeholder="Mobile Number" class="w-full p-4 rounded-xl border">
            <textarea id="custAddr" placeholder="Full Shipping Address" class="w-full p-4 rounded-xl border"></textarea>
            <button onclick="submitOrder()" class="w-full bg-primary text-white py-5 rounded-xl font-black">Complete Purchase</button>
            <button onclick="toggleCheckout(false)" class="w-full text-gray-400 text-sm font-bold uppercase">Back to Cart</button>
        </div>

        <div id="cartFooter" class="p-8 border-t space-y-6">
            <div class="flex justify-between items-center">
                <span class="font-bold text-gray-400">SUBTOTAL</span>
                <span id="cartTotal" class="text-3xl font-black">₹0</span>
            </div>
            <button onclick="toggleCheckout(true)" class="w-full bg-primary text-white py-5 rounded-full font-black text-lg shadow-xl">Place Order</button>
        </div>
    </div>

    <script>
        // AI-Generated Rich Descriptions & Benefits Data
        const milletIntel = {
            "Finger Millet": { 
                en: "Richest source of calcium among cereals. Perfect for bone density and gluten-free digestion.",
                ta: "ராகியில் கால்சியம் அதிகம் உள்ளது. எலும்பு ஆரோக்கியத்திற்கு சிறந்தது.",
                benefit: "Bone Health", style: "Breakfast Porridge" 
            },
            "Pearl Millet": { 
                en: "Packed with iron and protein. Known for its cooling properties and high energy release.",
                ta: "இரும்புச்சத்து நிறைந்தது. உடலுக்கு குளிர்ச்சி அளிக்கும்.",
                benefit: "Anti-Anemic", style: "Stir-fry" 
            },
            "Foxtail Millet": { 
                en: "Rich in vitamin B12 and fiber. Excellent for nervous system health and skin glow.",
                ta: "வைட்டமின் B12 மற்றும் நார்சத்து நிறைந்தது.",
                benefit: "Brain Health", style: "Salad Base" 
            }
            // Add other millets as needed...
        };

        const products = [
            { id: 1, name: "Finger Millet Vermicelli", nameTa: "ராகி சேமியா", cat: "Vermicelli", price: 30, size: "180g", grain: "Finger Millet" },
            { id: 2, name: "Pearl Millet Vermicelli", nameTa: "கம்பு சேமியா", cat: "Vermicelli", price: 30, size: "180g", grain: "Pearl Millet" },
            { id: 3, name: "Foxtail Millet Vermicelli", nameTa: "தினை சேமியா", cat: "Vermicelli", price: 40, size: "180g", grain: "Foxtail Millet" },
            { id: 14, name: "Finger Millet Noodles", nameTa: "ராகி நூடுல்ஸ்", cat: "Noodles", price: 80, size: "200g", grain: "Finger Millet" },
            { id: 15, name: "Pearl Millet Noodles", nameTa: "கம்பு நூடுல்ஸ்", cat: "Noodles", price: 80, size: "200g", grain: "Pearl Millet" }
        ];

        let cart = JSON.parse(localStorage.getItem('guud_cart')) || [];
        let currentLang = 'en';
        let modalQty = 1;

        // INIT
        window.onload = () => {
            renderProducts('All');
            updateCartUI();
        };

        function renderProducts(category) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            const filtered = category === 'All' ? products : products.filter(p => p.cat === category);
            
            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card bg-white rounded-[2.5rem] p-6 shadow-xl shadow-primary/5 cursor-pointer flex flex-col';
                card.onclick = (e) => { if(!e.target.closest('button')) openProduct(p.id); };
                card.innerHTML = `
                    <div class="aspect-square bg-gray-50 rounded-[2rem] mb-6 overflow-hidden flex items-center justify-center p-8">
                        <img src="https://github.com/guudlife26-commits/guudlife/blob/main/product_img.webp?raw=true" class="w-full h-auto object-contain">
                    </div>
                    <div class="flex-grow">
                        <span class="text-[10px] font-black text-secondary tracking-widest uppercase">${p.cat}</span>
                        <h4 class="text-xl font-bold mt-1 min-h-[3.5rem]">${currentLang === 'en' ? p.name : p.nameTa}</h4>
                        <p class="text-2xl font-black text-primary mt-4">₹${p.price}</p>
                    </div>
                    <button onclick="event.stopPropagation(); addToCart(${p.id}, 1)" class="w-full mt-6 bg-primary text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 hover:bg-secondary transition-all active:scale-95">
                        ADD TO BASKET
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        // MODAL SYSTEM
        function openProduct(id) {
            const p = products.find(x => x.id === id);
            const intel = milletIntel[p.grain] || { en: "A nutritious choice for a balanced lifestyle.", ta: "ஆரோக்கியமான வாழ்விற்கு ஒரு சிறந்த தேர்வு.", benefit: "Nutritional", style: "Healthy Dish" };
            
            modalQty = 1;
            document.getElementById('modalQty').innerText = 1;
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalTitleTa').innerText = p.nameTa;
            document.getElementById('modalPrice').innerText = `₹${p.price}`;
            document.getElementById('modalSize').innerText = p.size;
            document.getElementById('modalCat').innerText = p.cat;
            document.getElementById('modalImg').src = "https://github.com/guudlife26-commits/guudlife/blob/main/product_img.webp?raw=true";
            document.getElementById('modalDesc').innerText = currentLang === 'en' ? intel.en : intel.ta;
            document.getElementById('modalBenefit').innerText = intel.benefit;
            document.getElementById('modalStyle').innerText = intel.style;
            
            document.getElementById('modalAddBtn').onclick = () => {
                addToCart(p.id, modalQty);
                closeModal();
            };

            const modal = document.getElementById('productModal');
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('opacity-100'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('productModal');
            modal.classList.remove('opacity-100');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function updateModalQty(delta) {
            modalQty = Math.max(1, modalQty + delta);
            document.getElementById('modalQty').innerText = modalQty;
        }

        // CART SYSTEM
        function addToCart(id, qty) {
            const p = products.find(x => x.id === id);
            const existing = cart.find(i => i.id === id);
            if(existing) existing.qty += qty; else cart.push({...p, qty});
            saveAndSync();
            if(!document.getElementById('productModal').classList.contains('hidden')) return;
            toggleCart(true);
        }

        function saveAndSync() {
            localStorage.setItem('guud_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cartItems');
            const totalEl = document.getElementById('cartTotal');
            const countEl = document.getElementById('cartCount');
            container.innerHTML = '';
            let total = 0, count = 0;

            cart.forEach(item => {
                total += item.price * item.qty;
                count += item.qty;
                const el = document.createElement('div');
                el.className = 'flex items-center gap-4 bg-gray-50 p-4 rounded-2xl';
                el.innerHTML = `
                    <img src="https://github.com/guudlife26-commits/guudlife/blob/main/product_img.webp?raw=true" class="w-16 h-16 rounded-xl">
                    <div class="flex-grow">
                        <h5 class="font-bold text-sm leading-tight">${currentLang === 'en' ? item.name : item.nameTa}</h5>
                        <p class="font-black text-primary">₹${item.price}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeQty(${item.id}, -1)" class="w-6 h-6 border rounded-full">-</button>
                        <span class="font-bold text-sm">${item.qty}</span>
                        <button onclick="changeQty(${item.id}, 1)" class="w-6 h-6 border rounded-full">+</button>
                    </div>
                `;
                container.appendChild(el);
            });

            totalEl.innerText = `₹${total}`;
            countEl.innerText = count;
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            item.qty += delta;
            if(item.qty <= 0) cart = cart.filter(i => i.id !== id);
            saveAndSync();
        }

        function toggleCart(forceOpen = false) {
            const drawer = document.getElementById('cartDrawer');
            if(forceOpen) drawer.classList.add('open');
            else drawer.classList.toggle('open');
        }

        function toggleCheckout(isCheck) {
            document.getElementById('checkoutForm').classList.toggle('hidden', !isCheck);
            document.getElementById('cartFooter').classList.toggle('hidden', isCheck);
            document.getElementById('cartItems').classList.toggle('hidden', isCheck);
        }

        async function submitOrder() {
            const orderData = {
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                addr: document.getElementById('custAddr').value,
                items: cart.map(i => `${i.name} x ${i.qty}`).join(', '),
                total: document.getElementById('cartTotal').innerText
            };

            if(!orderData.name || !orderData.phone) return alert("Please fill all details");

            // Recommended Method: Use EmailJS or FormSubmit API
            // Here using the FormSubmit.co endpoint for demonstration
            const body = `Order from ${orderData.name} (${orderData.phone})\nItems: ${orderData.items}\nTotal: ${orderData.total}\nAddress: ${orderData.addr}`;
            
            // This would normally be an AJAX post
            window.open(`https://wa.me/919962867894?text=${encodeURIComponent(body)}`);
            
            // Clear cart
            cart = [];
            saveAndSync();
            toggleCart();
            alert("Order Details Prepared for WhatsApp! Clear cart.");
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ta' : 'en';
            renderProducts('All');
            updateCartUI();
        }

        function filterProducts(cat) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            event.target.classList.add('tab-active');
            renderProducts(cat);
        }
    </script>
</body>
</html>
